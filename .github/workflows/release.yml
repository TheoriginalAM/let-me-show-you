name: Release

# Build, (mac) sign + notarize, and publish the desktop app to a GitHub Release
# whenever a v* tag is pushed. electron-builder uploads the dmg/exe plus the
# latest-mac.yml / latest.yml manifests that electron-updater reads.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      # Serialize so the two jobs don't race to create the same GitHub Release.
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          # pnpm 11.1.2 needs Node >= 22.13 (uses node:sqlite).
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile (electron-vite)
        run: pnpm --filter @lmsy/desktop run compile
        env:
          # Baked into the main bundle by the vite define; enables Sentry in
          # released builds (no-op if the secret is unset).
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production

      # Sign only when a certificate secret is actually present. An empty
      # CSC_LINK still counts as "defined" and makes electron-builder try to load
      # an empty cert, so when it's absent we force-skip signing instead.
      - name: Configure macOS signing
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            echo "Developer ID certificate found — signing enabled."
            echo "CSC_LINK=$CSC_LINK" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "No CSC_LINK secret — building unsigned."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Build, publish & (mac) notarize
        working-directory: apps/desktop
        # Backstop against a pathological hang. The notarize hook self-bounds each
        # notary wait to 90m and fails fast on a timeout, so normal runs finish long
        # before this; it only covers a genuinely stuck process.
        timeout-minutes: 200
        # bash on all runners (incl. Windows) so the tag→version expansion works.
        shell: bash
        # Drive the artifact/manifest version from the v* tag, not package.json.
        run: pnpm exec electron-builder --${{ matrix.platform }} --publish always -c.extraMetadata.version="${GITHUB_REF_NAME#v}"
        env:
          # Publishing to GitHub Releases.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS notarization (used by build/notarize.cjs; skipped when unset).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  # electron-builder uploads into a DRAFT release; flip it to published once both
  # platform builds have finished (so /releases/latest + electron-updater see it).
  publish-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Un-draft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --repo "${{ github.repository }}"
