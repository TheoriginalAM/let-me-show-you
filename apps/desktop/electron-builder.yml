appId: au.com.letmeshowyou.desktop
productName: Let Me Show You
copyright: Copyright © 2026 Let Me Show You

directories:
  buildResources: build
  output: release

# electron-vite compiles main/preload/renderer into ./out
files:
  - out/**
  - package.json

# The ffmpeg binary must stay executable on disk, so unpack it from the asar.
asarUnpack:
  - '**/node_modules/ffmpeg-static/**'

# Code signing is intentionally NOT configured yet.
# `identity: null` skips macOS signing so unsigned local builds succeed.
mac:
  identity: null
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
